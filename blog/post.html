<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Real Mind Psychotherapy</title>
  <meta name="description" content="">
  <link rel="icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    .post-hero {
      background: var(--rm-green);
      padding: 100px 40px 60px;
      text-align: center;
    }

    .post-hero-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .post-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .post-category {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rm-accent);
    }

    .post-meta-dot {
      width: 3px;
      height: 3px;
      background: rgba(196, 180, 154, 0.5);
      border-radius: 50%;
    }

    .post-date {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(247, 244, 238, 0.5);
    }

    .post-title {
      font-family: Georgia, serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 400;
      color: var(--rm-bg);
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .post-author {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(247, 244, 238, 0.55);
      letter-spacing: 0.05em;
    }

    .post-featured-image {
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      background: var(--rm-bg-card);
    }

    .post-featured-image img {
      width: 100%;
      height: 480px;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .post-main {
      background: var(--rm-bg);
      padding: 80px 40px;
    }

    .post-main-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .post-body {
      font-family: Arial, sans-serif;
      font-size: 17px;
      line-height: 1.85;
      color: var(--rm-text-muted);
      margin-bottom: 24px;
    }

    .post-h2 {
      font-family: Georgia, serif;
      font-size: clamp(22px, 2.5vw, 28px);
      font-weight: 400;
      color: var(--rm-green);
      margin: 48px 0 16px;
      line-height: 1.3;
    }

    .post-h3 {
      font-family: Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--rm-green);
      margin: 36px 0 12px;
      line-height: 1.3;
    }

    .post-quote {
      border-left: 3px solid var(--rm-accent);
      padding: 20px 28px;
      margin: 40px 0;
      background: var(--rm-bg-card);
      border-radius: 0 10px 10px 0;
    }

    .post-quote p {
      font-family: Georgia, serif;
      font-size: 19px;
      font-style: italic;
      color: var(--rm-green);
      line-height: 1.6;
      margin: 0;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 16px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .post-list li {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--rm-text-muted);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .post-list li::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--rm-accent);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 8px;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--rm-bg-card);
    }

    .post-tag {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: var(--rm-text-muted);
      background: var(--rm-bg-card);
      border-radius: 20px;
      padding: 5px 14px;
    }

    .post-cta {
      background: var(--rm-green);
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      margin-top: 64px;
    }

    .post-cta-heading {
      font-family: Georgia, serif;
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 400;
      color: var(--rm-bg);
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .post-cta-body {
      font-family: Arial, sans-serif;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(247, 244, 238, 0.7);
      margin-bottom: 32px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .post-related {
      background: var(--rm-bg-card);
      padding: 80px 40px;
    }

    .post-related-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .post-related-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rm-accent);
      margin-bottom: 16px;
      display: block;
    }

    .post-related-heading {
      font-family: Georgia, serif;
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 400;
      color: var(--rm-green);
      margin-bottom: 40px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .related-card {
      display: block;
      text-decoration: none;
      background: var(--rm-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid transparent;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }

    .related-card:hover {
      border-color: var(--rm-accent);
      transform: translateY(-4px);
    }

    .related-card-image {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--rm-bg-card);
    }

    .related-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .related-card:hover .related-card-image img {
      transform: scale(1.04);
    }

    .related-card-content {
      padding: 20px;
    }

    .related-card-category {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rm-accent);
      display: block;
      margin-bottom: 8px;
    }

    .related-card-title {
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--rm-green);
      line-height: 1.35;
    }

    .post-loading {
      text-align: center;
      padding: 120px 40px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: var(--rm-text-muted);
    }

    @media (max-width: 768px) {
      .post-featured-image img {
        height: 280px;
      }

      .post-main {
        padding: 48px 24px;
      }

      .post-cta {
        padding: 36px 24px;
      }

      .related-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .post-related {
        padding: 48px 24px;
      }
    }
  </style>
</head>

<body>

  <div id="header-mount"></div>

  <main>

    <div id="post-loading" class="post-loading">Loading...</div>

    <div id="post-container" style="display:none;">

      <!-- POST HERO -->
      <section class="post-hero">
        <div class="post-hero-inner">
          <div class="post-meta">
            <span class="post-category" id="post-category"></span>
            <span class="post-meta-dot"></span>
            <span class="post-date" id="post-date"></span>
          </div>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-author" id="post-author"></div>
        </div>
      </section>

      <!-- FEATURED IMAGE -->
      <div class="post-featured-image">
        <img id="post-image" src="" alt="">
      </div>

      <!-- POST CONTENT -->
      <section class="post-main">
        <div class="post-main-inner">
          <div id="post-content"></div>
          <div class="post-tags" id="post-tags"></div>
          <div class="post-cta">
            <div class="post-cta-heading">Ready to begin your journey?</div>
            <div class="post-cta-body">Take the first step toward clarity, healing, and transformation. Real change
              starts with a clear mind.</div>
            <a href="https://www.zocdoc.com/practice/real-mind-mental-health-counseling-177953?lock=true&isNewPatient=false&referrerType=widget" target="_blank" rel="noopener noreferrer" class="btn-accent">Book Appointment on Zocdoc</a>
          </div>
        </div>
      </section>

      <!-- RELATED POSTS -->
      <section class="post-related">
        <div class="post-related-inner">
          <span class="post-related-label">Continue Reading</span>
          <h2 class="post-related-heading">More from the Real Mind Journal</h2>
          <div class="related-grid" id="related-posts"></div>
        </div>
      </section>

    </div>

  </main>

  <div id="footer-mount"></div>
  <script src="/js/main.js" type="module"></script>
  <script src="/js/blog.js" type="module"></script>

</body>

</html>
